<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Blooming Oasis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body onload="updateDateTime()">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid"><a class="navbar-brand" href="index.html">Blooming Oasis</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="product.html">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-6">
                <h3>Get in Touch</h3>
                <form id="contactForm" onsubmit="handleFormSubmit(event)">
                    <div class="mb-3"><input type="text" class="form-control" placeholder="Name" required></div>
                    <div class="mb-3"><input type="email" class="form-control" placeholder="Email" required></div>
                    <div class="mb-3"><textarea class="form-control" rows="4" placeholder="Your Inquiry"></textarea></div>
                    <button type="submit" class="btn btn-success">Submit Message</button>
                </form>
            </div>
            <div class="col-md-6 text-center">
                <h3>Live Support</h3>
                <button class="btn btn-outline-primary mb-4">Chat with a Plant Specialist</button>
                <div>
                    <h5>Follow Our Journey</h5>
                    <a href="https://instagram.com" target="_blank" class="btn btn-sm btn-light">Instagram</a>
                    <a href="https://facebook.com" target="_blank" class="btn btn-sm btn-light">Facebook</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3"><p id="date-time"></p></footer>
    <script src="script.js"></script>
</body>
</html>
